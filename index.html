<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="description" content="Play minecraft 1.8.9 in your browser" />
		<meta name="keywords" content="eaglercraft,ZX Client, minecraft, 1.8, 1.8.9, ZX, zx, zx Server" />
		<title>ZX Client</title>
		<meta property="og:locale" content="en-US" />
		<meta property="og:type" content="website" />
		<meta property="og:title" content="ZX Client" />
		<meta property="og:description" content="Play minecraft 1.8 in your browser" />
		<meta property="og:image" content="server-icon.png" />
		<link type="image/png" rel="shortcut icon" href="server-icon.png" />
		<script type="text/javascript" src="classes.js"></script>
		<script type="text/javascript" src="fix-webm-duration.js"></script>
		<script type="text/javascript">
			window.addEventListener("load", () => {
				if(document.location.href.startsWith("file:")) {
					alert("HTTP please, do not open this file locally, run a local HTTP server and load it via HTTP");
				}else {
					window.eaglercraftXOpts = {
						container: "game_frame",
						assetsURI: "assets.epk",
						localesURI: "lang/",
						servers: [
							{ addr: "Outdated Client! Use 1.12.2 !", name: "ZX Servers" },
							{ addr: "wss://x.mess.eu.org", name: "MesscraftX" },
							{ addr: "wss://arch.mc", name: "Arch MC" },
							{ addr: "wss://krypticmc.net", name: "KrypticMC" },
							{ addr: "wss://mc.lamplifesteal.xyz", name: "Lamp Network" },
							{ addr: "wss://vanillamc.org", name: "VanillaMC"}
						]
					};
					main();
				}
			});
		</script>
	</head>
	<body style="margin:0px;width:100vw;height:100vh;overflow:hidden;" id="game_frame">
	</body>
</html>
